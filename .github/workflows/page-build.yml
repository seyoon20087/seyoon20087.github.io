
name: page-build
on: [push]
jobs:
  page-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '16'
      - run: curl -L --output /usr/local/bin/gitlab-runner "https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-amd64"
      - run: chmod a+x /usr/local/bin/gitlab-runner
      - run: gitlab-runner exec shell page_build --timeout 80